name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint and Prettier checks
        run: npm run quality

  cd-placeholder:
    name: CD Placeholder
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Fail deployment intentionally
        run: |
          echo "CD is intentionally disabled for now."
          echo "CI and quality gate are active; deployment will be enabled later."
          exit 1
